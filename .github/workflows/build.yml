name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Get Rust stable version
        id: rust-ver
        run: |
          rustup toolchain install stable --no-self-update
          VERSION=$(rustup run stable rustc --version | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            RUST_VERSION=${{ steps.rust-ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/ankd-k/bevy-docker:latest
            ghcr.io/ankd-k/bevy-docker:rust-${{ steps.rust-ver.outputs.version }}
            ghcr.io/ankd-k/bevy-docker:${{ github.sha }}
