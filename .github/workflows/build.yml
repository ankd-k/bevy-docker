name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Rust stable version
        id: rust-ver
        run: |
          rustup toolchain install stable --no-self-update
          VERSION=$(rustup run stable rustc --version | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Bevy version
        id: bevy-ver
        run: |
          VERSION=$(sed -n 's/^bevy = "\(.*\)"/\1/p' Cargo.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          build-args: |
            RUST_VERSION=${{ steps.rust-ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/ankd-k/bevy-docker:latest
            ghcr.io/ankd-k/bevy-docker:bevy-${{ steps.bevy-ver.outputs.version }}
            ghcr.io/ankd-k/bevy-docker:${{ github.sha }}
